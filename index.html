<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Melicha</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231a1a18'/%3E%3Cpath d='M9 22V10l7 8 7-8v12' stroke='%23ffffff' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #f7f7f5;
  --white:     #ffffff;
  --border:    #e8e8e4;
  --border2:   #d4d4ce;
  --text:      #1a1a18;
  --sub:       #6b6b66;
  --muted:     #a8a8a2;
  --green:     #1a7a3c;
  --green-bg:  #edf7f1;
  --red:       #c0392b;
  --red-bg:    #fdf0ee;
  --accent:    #1a1a18;
  --radius:    12px;
  --sans:      'DM Sans', sans-serif;
  --mono:      'DM Mono', monospace;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
}

.app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 20px 20px 24px;
  position: sticky;
  top: 0;
  z-index: 10;
}

.header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.account-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--sub);
  letter-spacing: 0.01em;
}

.sync-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  background: none;
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 5px 12px;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  color: var(--sub);
  cursor: pointer;
  transition: all 0.15s;
}
.sync-btn:hover { background: var(--bg); border-color: var(--accent); color: var(--accent); }
.sync-btn.spinning svg { animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.balance-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}

.balance-amount {
  font-family: var(--mono);
  font-size: 42px;
  font-weight: 300;
  letter-spacing: -0.03em;
  line-height: 1;
  color: var(--text);
  transition: color 0.3s;
}
.balance-amount.positive { color: var(--green); }
.balance-amount.negative { color: var(--red); }

.balance-amount .currency {
  font-size: 0.45em;
  font-weight: 400;
  vertical-align: super;
  margin-right: 2px;
  opacity: 0.5;
}

/* ── Transaction list ── */
.tx-section {
  flex: 1;
  padding: 16px 16px 120px;
  overflow-y: auto;
}

.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 4px 12px;
}

.section-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
}

.section-count {
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  background: var(--border);
  padding: 2px 8px;
  border-radius: 20px;
}

.tx-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.tx-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
  position: relative;
  overflow: hidden;
}

.tx-card:active { box-shadow: 0 1px 4px rgba(0,0,0,0.06); }

.tx-card.confirming {
  border-color: var(--red);
  background: var(--red-bg);
}

.tx-row1 {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 4px;
}

.tx-notes {
  font-size: 14px;
  font-weight: 400;
  color: var(--text);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.3;
}

.tx-amount {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 500;
  white-space: nowrap;
  flex-shrink: 0;
}
.tx-amount.positive { color: var(--green); }
.tx-amount.negative { color: var(--red); }

.tx-row2 {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.tx-date {
  font-size: 12px;
  color: var(--muted);
}

.tx-bal {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
}

/* Delete confirm */
.tx-confirm {
  display: none;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid rgba(192,57,43,0.2);
}
.tx-card.confirming .tx-confirm { display: flex; }

.confirm-text { font-size: 12px; color: var(--red); font-weight: 500; }

.confirm-btns { display: flex; gap: 8px; }

.btn-keep, .btn-del {
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  padding: 5px 14px;
  border-radius: 6px;
  border: 1px solid;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-keep { border-color: var(--border2); color: var(--sub); background: var(--white); }
.btn-keep:hover { border-color: var(--accent); color: var(--accent); }
.btn-del { border-color: var(--red); color: var(--red); background: transparent; }
.btn-del:hover { background: var(--red); color: white; }

/* Empty */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  font-size: 14px;
}

/* ── Add button ── */
.add-bar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  padding: 12px 16px;
  padding-bottom: calc(12px + env(safe-area-inset-bottom));
  background: linear-gradient(to top, var(--bg) 65%, transparent);
}

.add-btn {
  width: 100%;
  padding: 15px;
  background: var(--accent);
  color: white;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 600;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: opacity 0.15s;
  letter-spacing: 0.01em;
}
.add-btn:active { opacity: 0.85; }

/* ── Modal ── */
.backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(2px);
  z-index: 100;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.backdrop.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--white);
  border-radius: 20px 20px 0 0;
  padding: 28px 20px;
  padding-bottom: calc(28px + env(safe-area-inset-bottom));
  width: 100%;
  max-width: 480px;
  transform: translateY(20px);
  transition: transform 0.25s cubic-bezier(0.32, 0.72, 0, 1);
}
.backdrop.open .modal { transform: translateY(0); }

.modal-handle {
  width: 36px;
  height: 4px;
  background: var(--border2);
  border-radius: 2px;
  margin: 0 auto 24px;
}

.modal-title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 20px;
}

/* Type toggle */
.type-toggle {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 20px;
}

.type-opt {
  padding: 11px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: transparent;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--sub);
}
.type-opt.sel-income  { border-color: var(--green); background: var(--green-bg); color: var(--green); }
.type-opt.sel-expense { border-color: var(--red);   background: var(--red-bg);   color: var(--red);   }

/* Form */
.field { margin-bottom: 14px; }

.field-label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 7px;
}

.field-wrap { position: relative; }
.field-prefix {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 15px;
  pointer-events: none;
}

.field-input {
  width: 100%;
  padding: 13px 14px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-family: var(--sans);
  font-size: 15px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
  -webkit-appearance: none;
}
.field-input.with-prefix { padding-left: 28px; }
.field-input:focus { border-color: var(--accent); }
.field-input::placeholder { color: var(--muted); }

/* Modal actions */
.modal-actions {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 10px;
  margin-top: 20px;
}

.btn-cancel-modal {
  padding: 14px;
  border: 1.5px solid var(--border2);
  border-radius: 10px;
  background: transparent;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 500;
  color: var(--sub);
  cursor: pointer;
  transition: all 0.15s;
}
.btn-cancel-modal:hover { border-color: var(--accent); color: var(--accent); }

.btn-save {
  padding: 14px;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 600;
  color: white;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

/* Toast */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--text);
  color: white;
  font-size: 13px;
  font-weight: 500;
  padding: 9px 18px;
  border-radius: 20px;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: all 0.2s;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.err  { background: var(--red); }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-row">
      <div class="account-label">Melicha Balance</div>
      <button class="sync-btn" id="syncBtn" onclick="loadData()">
        <svg id="syncIco" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
        Sync
      </button>
    </div>
    <div class="balance-label">Current Balance</div>
    <div class="balance-amount" id="balDisplay">
      <span class="currency">$</span><span id="balNum">—</span>
    </div>
  </div>

  <div class="tx-section">
    <div class="section-header">
      <div class="section-title">Transactions</div>
      <div class="section-count" id="txCount">—</div>
    </div>
    <div class="tx-list" id="txList">
      <div class="empty">Loading…</div>
    </div>
  </div>

  <div class="add-bar">
    <button class="add-btn" onclick="openModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      New Transaction
    </button>
  </div>
</div>

<!-- Modal -->
<div class="backdrop" id="backdrop" onclick="backdropClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Add Transaction</div>

    <div class="type-toggle">
      <button class="type-opt sel-income" id="optIncome"  onclick="setType('income')">＋ Income</button>
      <button class="type-opt"            id="optExpense" onclick="setType('expense')">－ Expense</button>
    </div>

    <div class="field">
      <label class="field-label">Amount</label>
      <div class="field-wrap">
        <span class="field-prefix">$</span>
        <input class="field-input with-prefix" type="number" inputmode="decimal"
               id="fAmount" placeholder="0.00" min="0" step="0.01">
      </div>
    </div>

    <div class="field">
      <label class="field-label">Notes</label>
      <input class="field-input" type="text" id="fNotes" placeholder="Description">
    </div>

    <div class="field">
      <label class="field-label">Date</label>
      <input class="field-input" type="date" id="fDate">
    </div>

    <div class="modal-actions">
      <button class="btn-cancel-modal" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="saveBtn" onclick="submit()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyE-LObcUbULuGm6DoDv0dq5a2qIK3EuEBGgNoCNAvmtaJJHT66z0xLMWqA53xP6f8z4A/exec';

let transactions = [];
let balance = 0;
let txType = 'income';
let confirmingRow = null;

// ── Init ──────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  setTodayDate();
  loadData();
});

function setTodayDate() {
  const d = new Date();
  document.getElementById('fDate').value =
    `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ── API ───────────────────────────────────────────────────
async function call(params) {
  const url = new URL(SCRIPT_URL);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, String(v)));
  const r = await fetch(url, { redirect: 'follow' });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function loadData() {
  setSyncing(true);
  try {
    const data = await call({ action: 'getTransactions' });
    if (data.error) throw new Error(data.error);
    transactions = (data.transactions || []).reverse();
    balance = data.balance || 0;
    render();
  } catch(e) {
    showToast('Failed to load: ' + e.message, true);
  } finally {
    setSyncing(false);
  }
}

// ── Render ────────────────────────────────────────────────
function render() {
  // Balance
  const el = document.getElementById('balDisplay');
  const num = document.getElementById('balNum');
  const abs = Math.abs(balance);
  num.textContent = fmt(abs);
  el.className = 'balance-amount' + (balance > 0 ? ' positive' : balance < 0 ? ' negative' : '');
  if (balance < 0) num.textContent = '-' + num.textContent;

  // Count
  document.getElementById('txCount').textContent = transactions.length;

  // List
  const list = document.getElementById('txList');
  if (!transactions.length) {
    list.innerHTML = '<div class="empty">No transactions yet</div>';
    return;
  }

  list.innerHTML = transactions.map(tx => {
    const pos = tx.amount >= 0;
    const sign = pos ? '+' : '';
    return `
      <div class="tx-card ${pos ? 'positive' : 'negative'}" id="tx-${tx.rowNumber}" onclick="tapTx(${tx.rowNumber})">
        <div class="tx-row1">
          <div class="tx-notes">${esc(tx.notes || '—')}</div>
          <div class="tx-amount ${pos ? 'positive' : 'negative'}">${sign}$${fmt(Math.abs(tx.amount))}</div>
        </div>
        <div class="tx-row2">
          <div class="tx-date">${fmtDate(tx.date)}</div>
          <div class="tx-bal">bal $${fmt(tx.balance)}</div>
        </div>
        <div class="tx-confirm">
          <span class="confirm-text">Delete this?</span>
          <div class="confirm-btns">
            <button class="btn-keep" onclick="cancelDel(event,${tx.rowNumber})">Keep</button>
            <button class="btn-del"  onclick="confirmDel(event,${tx.rowNumber})">Delete</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

// ── Delete ────────────────────────────────────────────────
function tapTx(row) {
  if (confirmingRow === row) return;
  if (confirmingRow !== null) cancelDel(null, confirmingRow);
  confirmingRow = row;
  document.getElementById(`tx-${row}`)?.classList.add('confirming');
}
function cancelDel(e, row) {
  if (e) e.stopPropagation();
  document.getElementById(`tx-${row}`)?.classList.remove('confirming');
  confirmingRow = null;
}
async function confirmDel(e, row) {
  e.stopPropagation();
  const el = document.getElementById(`tx-${row}`);
  if (el) { el.style.opacity = '0.4'; el.style.pointerEvents = 'none'; }
  confirmingRow = null;
  try {
    const data = await call({ action: 'deleteTransaction', rowNumber: row });
    if (data.error) throw new Error(data.error);
    transactions = (data.transactions || []).reverse();
    balance = data.balance || 0;
    render();
    showToast('Deleted');
  } catch(err) {
    showToast('Delete failed: ' + err.message, true);
    loadData();
  }
}

// ── Modal ─────────────────────────────────────────────────
function openModal() {
  document.getElementById('backdrop').classList.add('open');
  setTimeout(() => document.getElementById('fAmount').focus(), 300);
}
function closeModal() {
  document.getElementById('backdrop').classList.remove('open');
  document.getElementById('fAmount').value = '';
  document.getElementById('fNotes').value  = '';
  setTodayDate();
  setType('income');
}
function backdropClick(e) {
  if (e.target === document.getElementById('backdrop')) closeModal();
}
function setType(t) {
  txType = t;
  document.getElementById('optIncome').className  = 'type-opt' + (t==='income'  ? ' sel-income'  : '');
  document.getElementById('optExpense').className = 'type-opt' + (t==='expense' ? ' sel-expense' : '');
}

async function submit() {
  const raw = parseFloat(document.getElementById('fAmount').value);
  if (!raw || raw <= 0) { showToast('Enter a valid amount', true); return; }
  const amount = txType === 'expense' ? -raw : raw;
  const notes  = document.getElementById('fNotes').value.trim();
  const date   = document.getElementById('fDate').value;

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'Saving…';
  try {
    const data = await call({ action: 'addTransaction', amount, notes, date });
    if (data.error) throw new Error(data.error);
    transactions = (data.transactions || []).reverse();
    balance = data.balance || 0;
    render();
    closeModal();
    showToast('Transaction saved');
  } catch(err) {
    showToast('Failed: ' + err.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save';
  }
}

// ── Helpers ───────────────────────────────────────────────
function setSyncing(on) {
  document.getElementById('syncBtn').classList.toggle('spinning', on);
}
function fmt(n) {
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtDate(s) {
  if (!s) return '';
  const [y,m,d] = s.split('-');
  const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${parseInt(d)} ${mo[parseInt(m)-1]} ${y}`;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
let _toast;
function showToast(msg, isErr=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  clearTimeout(_toast);
  _toast = setTimeout(() => t.className = 'toast', 2800);
}
</script>
</body>
</html>
